name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: roadmap
          POSTGRES_PASSWORD: roadmap
          POSTGRES_DB: roadmap_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U roadmap"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      JWT_SECRET: test-secret
      SEED_USERNAME: testuser
      SEED_PASSWORD: testpass
      GITHUB_TOKEN: ""
      DATABASE_URL: postgresql+asyncpg://roadmap:roadmap@localhost:5432/roadmap_tracker_test
      REDIS_URL: redis://localhost:6379/1
      TEST_DATABASE_URL: postgresql+asyncpg://roadmap:roadmap@localhost:5432/roadmap_tracker_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check app

      - name: Type check (mypy)
        run: mypy app

      - name: Run migrations (exercise Alembic)
        run: alembic upgrade head

      - name: Check migration/model drift
        run: alembic check

      - name: Test (pytest + coverage)
        run: pytest --cov=app --cov-report=term-missing -q
